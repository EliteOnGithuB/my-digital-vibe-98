<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EliteUk</title>
    <meta name="description" content="Ramiro — Digital Space" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #0d0d0d;
        --fg: #ebebeb;
        --muted: #737373;
        --card: #171717;
        --border: #242424;
        --border-hover: #333;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      /* Cursor glow */
      #glow {
        position: fixed;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
        will-change: left, top;
        display: none;
      }
      @media (min-width: 640px) {
        #glow { display: block; }
        body { cursor: none; }
      }

      main {
        position: relative;
        z-index: 10;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 1.5rem;
      }

      .container {
        width: 100%;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }

      /* Avatar & Name */
      .profile {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 200;
        color: rgba(255,255,255,0.6);
      }

      .name {
        font-size: 0.75rem;
        font-weight: 400;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.85);
      }

      .subtitle {
        font-size: 0.625rem;
        color: var(--muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 0.25rem;
      }

      /* Divider */
      .divider {
        display: flex;
        justify-content: center;
      }
      .divider span {
        width: 2rem;
        height: 0;
        border-top: 1px solid rgba(255,255,255,0.08);
      }

      /* Links */
      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .link {
        display: flex;
        align-items: center;
        padding: 1rem 1.25rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(255,255,255,0.04);
        background: rgba(30,30,30,0.4);
        text-decoration: none;
        color: inherit;
        transition: border-color 0.3s, background 0.3s;
      }
      .link:hover {
        border-color: rgba(255,255,255,0.08);
        background: rgba(30,30,30,0.7);
      }

      .link-icon {
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--muted);
        transition: color 0.3s;
      }
      .link:hover .link-icon { color: var(--fg); }

      .link-icon svg {
        width: 1rem;
        height: 1rem;
        fill: currentColor;
      }

      .link-text {
        flex: 1;
        text-align: center;
        padding-right: 0.75rem;
      }

      .link-label {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.75);
      }

      .link-desc {
        font-size: 0.6rem;
        color: var(--muted);
        margin-top: 0.2rem;
      }

      .link-arrow {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        color: rgba(255,255,255,0.15);
        transition: color 0.3s;
      }
      .link:hover .link-arrow { color: rgba(255,255,255,0.4); }

      footer {
        position: relative;
        z-index: 10;
        padding: 1.5rem 2rem;
        font-size: 0.625rem;
        color: rgba(255,255,255,0.15);
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div id="glow"></div>

    <main>
      <div class="container">
        <div class="profile">
          <div class="avatar">R</div>
          <div>
            <div class="name">Ramiro</div>
            <div class="subtitle">Digital Space</div>
          </div>
        </div>

        <div class="divider"><span></span></div>

        <div class="links">
          <a href="https://x.com/EliteUk_" target="_blank" rel="noopener noreferrer" class="link">
            <div class="link-icon">
              <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>
            <div class="link-text">
              <div class="link-label">Twitter / X</div>
              <div class="link-desc">@EliteUk_</div>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </a>

          <a href="https://www.tiktok.com/@e1teuk" target="_blank" rel="noopener noreferrer" class="link">
            <div class="link-icon">
              <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.75a8.18 8.18 0 0 0 4.76 1.52V6.79a4.83 4.83 0 0 1-1-.1z"/></svg>
            </div>
            <div class="link-text">
              <div class="link-label">TikTok</div>
              <div class="link-desc">@e1teuk</div>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </a>

          <a href="https://open.spotify.com/playlist/0wd3FBxmmGAhBpGV4RfdQO" target="_blank" rel="noopener noreferrer" class="link">
            <div class="link-icon">
              <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            </div>
            <div class="link-text">
              <div class="link-label">Spotify</div>
              <div class="link-desc">Playlist</div>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </a>
        </div>
      </div>
    </main>

    <footer>© 2026 e1te.info</footer>

    <script>
      const glow = document.getElementById('glow');
      document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
      });
    </script>
  </body>
</html>
